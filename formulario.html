<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulário</title>
    <link rel="stylesheet" href="./css/style.css">
    <link rel="stylesheet" href="./css/formulario.css">
</head>
<body class="page-formulario">
    <header class="site-header">
        <a class="brand" href="index.html">Pedro Ricardo</a>
        <nav class="site-nav" aria-label="Main navigation">
            <ul>
                <li><a href="index.html">Contador</a></li>
                <li><a href="cronometro.html">Cronômetro</a></li>
                <li><a href="formulario.html" class="active">Formulário</a></li>
            </ul>
        </nav>
    </header>
    <main>
        <div class="dividido">
            <section class="esquerda">
                <div class="cartao">
                    <h1>Formulário</h1>
                    <form id="formulario" novalidate>
                        <label for="nome">Nome</label>
                        <input type="text" id="nome" name="nome" required>

                        <label for="email">Email</label>
                        <input type="email" id="email" name="email" required>

                        <label for="curso">Curso</label>
                        <input type="text" id="curso" name="curso" required>

                        <div class="form-actions">
                            <button class="primary" type="submit">Enviar</button>
                            <button type="reset" class="ghost">Limpar</button>
                        </div>

                        <div id="form-msg" class="msg" aria-live="polite"></div>
                        <div id="form-result" class="resultado" aria-live="polite"></div>
                    </form>
                </div>
            </section>
            <aside class="direita">
                <h3>Pra quê tanto código <br>
                    se a vida não é programda? <br>
                    E pra quê tanta lógica <br>
                    Se as melhores coisas não têm sentido?
                </h3>
                <div class="espaco"></div>
            </aside>
        </div>
    </main>
    <script src="./js/formulario.js"></script>
</body>
</html>
